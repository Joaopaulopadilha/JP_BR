<!-- index.html -->
<!-- Ollama Web Chat com painel artifact lateral para visualização de código -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ollama Web - Config Persistente</title>

  <style>
    :root {
      --bg: #121212;
      --sidebar-bg: #1e1e1e;
      --user-bg: #2b2d31;
      --user-border: #007acc;
      --bot-bg: #232428;
      --bot-border: #388e3c;
      --code-bg: #0d1117;
      --code-header: #161b22;
      --border: #30363d;
      --artifact-bg: #1a1a2e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      background: var(--bg);
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar config ── */
    #sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--sidebar-bg);
      padding: 20px;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    /* ── Chat area ── */
    #chat-area {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .message {
      margin-bottom: 20px;
      padding: 14px 18px;
      border-radius: 10px;
      max-width: 90%;
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .user {
      background: var(--user-bg);
      border-left: 5px solid var(--user-border);
      margin-left: auto;
    }

    .bot {
      background: var(--bot-bg);
      border-left: 5px solid var(--bot-border);
      margin-right: auto;
    }

    /* ── Referência clicável de código (no chat) ── */
    .code-ref {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
      padding: 10px 16px;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 1px solid #334;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: normal;
    }

    .code-ref:hover {
      border-color: var(--user-border);
      background: linear-gradient(135deg, #1e1e36, #1a2744);
    }

    .code-ref-icon { font-size: 1.3rem; }

    .code-ref-info {
      display: flex;
      flex-direction: column;
    }

    .code-ref-title {
      font-size: 0.9rem;
      color: #e0e0e0;
      font-weight: 500;
    }

    .code-ref-lang {
      font-size: 0.75rem;
      color: #888;
    }

    /* ── Painel Artifact (lateral direita) ── */
    #artifact-panel {
      width: 0;
      background: var(--artifact-bg);
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
      transition: width 0.3s ease;
      overflow: hidden;
    }

    #artifact-panel.open {
      width: 55%;
      min-width: 450px;
    }

    .artifact-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      background: var(--code-header);
      border-bottom: 1px solid var(--border);
      min-height: 52px;
      gap: 12px;
    }

    .artifact-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .artifact-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e0e0e0;
      white-space: nowrap;
    }

    .artifact-lang-badge {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 4px;
      background: #2a2a4a;
      color: #aaa;
      white-space: nowrap;
    }

    .artifact-tabs {
      display: flex;
      gap: 4px;
    }

    .artifact-tab {
      background: transparent;
      border: 1px solid transparent;
      color: #888;
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .artifact-tab:hover {
      color: #ccc;
      background: #ffffff10;
    }

    .artifact-tab.active {
      background: #007acc;
      border-color: #007acc;
      color: #fff;
    }

    .artifact-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .artifact-btn {
      background: #21262d;
      border: 1px solid #444;
      color: #ccc;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .artifact-btn:hover { background: #30363d; }

    .artifact-close {
      background: none;
      border: none;
      color: #888;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }

    .artifact-close:hover { color: #fff; }

    .artifact-body {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .artifact-code {
      width: 100%;
      height: 100%;
      overflow: auto;
      padding: 18px;
      margin: 0;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.92rem;
      line-height: 1.5;
      background: var(--code-bg);
      color: #e0e0e0;
      white-space: pre;
      display: none;
    }

    .artifact-code.visible { display: block; }

    .artifact-preview {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
      display: none;
    }

    .artifact-preview.visible { display: block; }

    /* ── Input area ── */
    .input-area {
      padding: 16px 24px;
      background: var(--sidebar-bg);
      border-top: 1px solid #333;
      display: flex;
      gap: 12px;
    }

    textarea {
      flex: 1;
      background: #2b2d31;
      border: 1px solid #444;
      color: white;
      padding: 12px;
      border-radius: 8px;
      font-size: 1rem;
      resize: none;
      min-height: 54px;
      max-height: 180px;
    }

    button {
      background: var(--user-border);
      color: white;
      border: none;
      padding: 0 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    button:disabled {
      background: #444;
      cursor: not-allowed;
    }

    #send.stop-mode {
      background: #d32f2f;
      cursor: pointer;
    }

    #send.stop-mode:hover {
      background: #b71c1c;
    }

    .controls label {
      font-size: 0.88rem;
      color: #aaa;
      display: block;
      margin-bottom: 6px;
    }

    input[type=number], input[type=range], select {
      width: 100%;
      padding: 10px;
      background: #2b2d31;
      border: 1px solid #444;
      color: white;
      border-radius: 6px;
    }

    .save-btn {
      background: #388e3c;
      padding: 10px;
      text-align: center;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 8px;
    }

    .save-btn:hover { background: #2e7d32; }

    /* ── Novo Chat e Histórico ── */
    .new-chat-btn {
      background: var(--user-border);
      color: #fff;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
      width: 100%;
    }

    .new-chat-btn:hover { background: #005fa3; }

    #history-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }

    .history-item {
      padding: 10px 12px;
      background: #2b2d31;
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.84rem;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .history-item:hover {
      border-color: #444;
      background: #333;
    }

    .history-item.active {
      border-color: var(--user-border);
      background: #1a2a3a;
      color: #fff;
    }

    .history-item-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-item-delete {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
      display: none;
    }

    .history-item:hover .history-item-delete {
      display: block;
    }

    .history-item-delete:hover { color: #e55; }

    .history-label {
      font-size: 0.78rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    /* ── System Prompt ── */
    .prompt-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .prompt-section label {
      font-size: 0.78rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .prompt-textarea {
      background: #2b2d31;
      border: 1px solid #444;
      color: #ccc;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.84rem;
      font-family: system-ui, -apple-system, sans-serif;
      resize: vertical;
      min-height: 70px;
      max-height: 200px;
      line-height: 1.4;
    }

    .prompt-textarea::placeholder { color: #555; }

    .prompt-textarea:focus {
      outline: none;
      border-color: var(--user-border);
    }

    /* ── Barra de contexto ── */
    .ctx-usage {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 10px 0;
    }

    .ctx-usage-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: #888;
    }

    .ctx-usage-bar {
      height: 6px;
      background: #2b2d31;
      border-radius: 3px;
      overflow: hidden;
    }

    .ctx-usage-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--user-border);
      transition: width 0.4s ease, background 0.4s ease;
      width: 0%;
    }

    .ctx-usage-fill.warning { background: #f9a825; }
    .ctx-usage-fill.danger { background: #d32f2f; }

    .ctx-usage-details {
      font-size: 0.72rem;
      color: #666;
      display: flex;
      justify-content: space-between;
    }

    /* ── Drag & Drop e Anexos ── */
    .drop-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 122, 204, 0.15);
      border: 3px dashed var(--user-border);
      border-radius: 12px;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
    }

    .drop-overlay.visible {
      display: flex;
    }

    .drop-overlay-text {
      background: var(--user-border);
      color: #fff;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
    }

    #attachments-bar {
      display: none;
      padding: 8px 24px 0;
      background: var(--sidebar-bg);
      gap: 8px;
      flex-wrap: wrap;
    }

    #attachments-bar.has-items { display: flex; }

    .attach-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #2b2d31;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.82rem;
      color: #ccc;
      max-width: 220px;
      position: relative;
    }

    .attach-item img {
      width: 36px;
      height: 36px;
      object-fit: cover;
      border-radius: 4px;
    }

    .attach-item-icon { font-size: 1.2rem; }

    .attach-item-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .attach-item-remove {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0;
      line-height: 1;
    }

    .attach-item-remove:hover { color: #e55; }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .attach-btn {
      background: #2b2d31;
      border: 1px solid #444;
      color: #ccc;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .attach-btn:hover {
      background: #3a3d42;
      border-color: #666;
    }

    /* imagem dentro da mensagem do user */
    .msg-image {
      max-width: 200px;
      max-height: 200px;
      border-radius: 8px;
      margin: 6px 0;
      display: block;
    }

    .msg-file-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #1a2a3a;
      border: 1px solid #334;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.8rem;
      color: #aaa;
      margin: 4px 0;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <h2>Ollama Chat</h2>

  <button class="new-chat-btn" id="new-chat">+ Novo Chat</button>

  <div class="history-label">Histórico</div>
  <div id="history-list"></div>

  <div class="controls">
    <label>Modelo</label>
    <select id="model"></select>

    <label>Temperatura: <span id="temp-val">0.7</span></label>
    <input type="range" id="temp" min="0" max="2" step="0.05" value="0.7">

    <label>Contexto: <span id="ctx-val">32768</span> tokens</label>
    <input type="range" id="ctx" min="2048" max="131072" step="1024" value="32768">
  </div>

  <div class="prompt-section">
    <label>Instruções do Sistema</label>
    <textarea class="prompt-textarea" id="system-prompt" rows="3" placeholder="Ex: Responda apenas com código, sem comentários. Use sempre TypeScript..."></textarea>
  </div>

  <div class="save-btn" id="save-config">Salvar Configurações</div>

  <div class="ctx-usage" id="ctx-usage">
    <div class="ctx-usage-header">
      <span>Contexto</span>
      <span id="ctx-usage-text">— / —</span>
    </div>
    <div class="ctx-usage-bar">
      <div class="ctx-usage-fill" id="ctx-usage-fill"></div>
    </div>
    <div class="ctx-usage-details">
      <span id="ctx-detail-prompt">prompt: —</span>
      <span id="ctx-detail-gen">gerado: —</span>
    </div>
  </div>

  <div style="font-size:0.8rem; color:#666; text-align:center;">
    Ollama @ localhost:11434
  </div>
</div>

<div id="chat-area">
  <div id="messages" style="position:relative;">
    <div class="drop-overlay" id="drop-overlay">
      <span class="drop-overlay-text">Solte arquivos aqui</span>
    </div>
  </div>

  <div id="attachments-bar"></div>

  <div class="input-area">
    <button class="attach-btn" id="attach-btn" title="Anexar arquivo">📎</button>
    <input type="file" id="file-input" multiple hidden>
    <textarea id="input" rows="2" placeholder="Digite sua mensagem..."></textarea>
    <button id="send" disabled>Enviar</button>
  </div>
</div>

<!-- Painel Artifact Lateral -->
<div id="artifact-panel">
  <div class="artifact-header">
    <div class="artifact-header-left">
      <span class="artifact-title" id="artifact-title">Código</span>
      <span class="artifact-lang-badge" id="artifact-lang">code</span>
    </div>
    <div class="artifact-tabs" id="artifact-tabs">
      <button class="artifact-tab active" id="tab-code">Código</button>
      <button class="artifact-tab" id="tab-preview">Preview</button>
    </div>
    <div class="artifact-actions">
      <button class="artifact-btn" id="artifact-copy">Copiar</button>
      <button class="artifact-close" id="artifact-close">&#10005;</button>
    </div>
  </div>
  <div class="artifact-body">
    <pre class="artifact-code visible" id="artifact-code"></pre>
    <iframe class="artifact-preview" id="artifact-preview" sandbox="allow-scripts allow-modals"></iframe>
  </div>
</div>

<script>
const API = window.location.origin.includes('localhost:11434')
  ? 'http://localhost:11434'
  : window.location.origin;  // Quando servido pelo JP, usa o mesmo origin
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const modelSelect = document.getElementById('model');
const tempSlider = document.getElementById('temp');
const tempVal = document.getElementById('temp-val');
const ctxSlider = document.getElementById('ctx');
const ctxVal = document.getElementById('ctx-val');
const saveBtn = document.getElementById('save-config');

// Artifact panel refs
const artifactPanel = document.getElementById('artifact-panel');
const artifactTitle = document.getElementById('artifact-title');
const artifactLang = document.getElementById('artifact-lang');
const artifactCode = document.getElementById('artifact-code');
const tabCode = document.getElementById('tab-code');
const tabPreview = document.getElementById('tab-preview');
const artifactCopy = document.getElementById('artifact-copy');
const artifactClose = document.getElementById('artifact-close');

// Context usage refs
const ctxUsageText = document.getElementById('ctx-usage-text');
const ctxUsageFill = document.getElementById('ctx-usage-fill');
const ctxDetailPrompt = document.getElementById('ctx-detail-prompt');
const ctxDetailGen = document.getElementById('ctx-detail-gen');

function updateCtxUsage(promptTokens, genTokens) {
  const total = promptTokens + genTokens;
  const maxCtx = parseInt(ctxSlider.value);
  const pct = Math.min((total / maxCtx) * 100, 100);

  ctxUsageText.textContent = `${total.toLocaleString()} / ${maxCtx.toLocaleString()}`;
  ctxUsageFill.style.width = pct + '%';

  ctxUsageFill.classList.remove('warning', 'danger');
  if (pct >= 90) ctxUsageFill.classList.add('danger');
  else if (pct >= 70) ctxUsageFill.classList.add('warning');

  ctxDetailPrompt.textContent = `prompt: ${promptTokens.toLocaleString()}`;
  ctxDetailGen.textContent = `gerado: ${genTokens.toLocaleString()}`;
}

function resetCtxUsage() {
  ctxUsageText.textContent = '— / —';
  ctxUsageFill.style.width = '0%';
  ctxUsageFill.classList.remove('warning', 'danger');
  ctxDetailPrompt.textContent = 'prompt: —';
  ctxDetailGen.textContent = 'gerado: —';
}

let conversation = [];
let currentArtifactCode = '';
let currentArtifactLang = '';
let currentChatId = null;

// ── Histórico persistente ──

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function getAllChats() {
  try {
    return JSON.parse(localStorage.getItem('ollamaChats') || '[]');
  } catch { return []; }
}

function saveAllChats(chats) {
  localStorage.setItem('ollamaChats', JSON.stringify(chats));
}

function getChatTitle(messages) {
  const firstUser = messages.find(m => m.role === 'user');
  if (!firstUser) return 'Chat vazio';
  const text = firstUser.content.trim();
  return text.length > 50 ? text.substring(0, 50) + '…' : text;
}

function saveCurrentChat() {
  if (conversation.length === 0) return;

  const chats = getAllChats();
  const existing = chats.findIndex(c => c.id === currentChatId);
  const chatData = {
    id: currentChatId,
    title: getChatTitle(conversation),
    messages: conversation,
    model: modelSelect.value,
    updatedAt: Date.now()
  };

  if (existing >= 0) {
    chats[existing] = chatData;
  } else {
    chats.unshift(chatData);
  }

  saveAllChats(chats);
  renderHistory();
}

function loadChat(chatId) {
  const chats = getAllChats();
  const chat = chats.find(c => c.id === chatId);
  if (!chat) return;

  currentChatId = chat.id;
  conversation = chat.messages || [];

  // Fechar artifact e resetar contexto
  artifactPanel.classList.remove('open');
  resetCtxUsage();

  // Renderizar mensagens
  messagesEl.innerHTML = '';
  for (const msg of conversation) {
    const el = renderMessage(msg.content, msg.role === 'user');
    messagesEl.appendChild(el);
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;

  renderHistory();
}

function deleteChat(chatId) {
  let chats = getAllChats();
  chats = chats.filter(c => c.id !== chatId);
  saveAllChats(chats);

  // Se deletou o chat atual, iniciar novo
  if (chatId === currentChatId) {
    startNewChat();
  }

  renderHistory();
}

function startNewChat() {
  currentChatId = generateId();
  conversation = [];
  messagesEl.innerHTML = '';
  artifactPanel.classList.remove('open');
  resetCtxUsage();
  renderHistory();
}

function renderHistory() {
  const chats = getAllChats();
  const historyList = document.getElementById('history-list');
  historyList.innerHTML = '';

  for (const chat of chats) {
    const item = document.createElement('div');
    item.className = 'history-item' + (chat.id === currentChatId ? ' active' : '');

    const text = document.createElement('span');
    text.className = 'history-item-text';
    text.textContent = chat.title;

    const del = document.createElement('button');
    del.className = 'history-item-delete';
    del.textContent = '✕';
    del.onclick = (e) => {
      e.stopPropagation();
      deleteChat(chat.id);
    };

    item.appendChild(text);
    item.appendChild(del);
    item.onclick = () => loadChat(chat.id);

    historyList.appendChild(item);
  }
}

document.getElementById('new-chat').onclick = startNewChat;

// ── Artifact Panel ──

function openArtifact(lang, code) {
  currentArtifactCode = code;
  currentArtifactLang = lang;
  artifactLang.textContent = lang || 'code';
  artifactTitle.textContent = lang ? `Código ${lang.toUpperCase()}` : 'Código';
  artifactCode.textContent = code;

  const previewable = ['html', 'svg'].includes(lang.toLowerCase());
  tabPreview.style.display = previewable ? '' : 'none';

  if (previewable) {
    showPreview();
  } else {
    showCode();
  }

  artifactPanel.classList.add('open');
}

function showCode() {
  artifactCode.classList.add('visible');
  // Esconder iframe
  const oldIframe = document.getElementById('artifact-preview');
  if (oldIframe) oldIframe.classList.remove('visible');
  tabCode.classList.add('active');
  tabPreview.classList.remove('active');
}

function showPreview() {
  artifactCode.classList.remove('visible');
  tabPreview.classList.add('active');
  tabCode.classList.remove('active');

  // Recriar o iframe do zero para evitar problemas de sandbox/srcdoc
  const body = document.querySelector('.artifact-body');
  const oldIframe = document.getElementById('artifact-preview');
  if (oldIframe) oldIframe.remove();

  const iframe = document.createElement('iframe');
  iframe.id = 'artifact-preview';
  iframe.className = 'artifact-preview visible';
  iframe.sandbox = 'allow-scripts allow-modals';
  iframe.srcdoc = currentArtifactCode;
  body.appendChild(iframe);
}

tabCode.onclick = () => showCode();
tabPreview.onclick = () => showPreview();

artifactCopy.onclick = () => {
  navigator.clipboard.writeText(currentArtifactCode).then(() => {
    artifactCopy.textContent = 'Copiado!';
    setTimeout(() => artifactCopy.textContent = 'Copiar', 1800);
  });
};

artifactClose.onclick = () => {
  artifactPanel.classList.remove('open');
};

// ── Sliders ──
tempSlider.oninput = () => tempVal.textContent = tempSlider.value;
ctxSlider.oninput = () => ctxVal.textContent = ctxSlider.value;

// ── Config persistente ──
const systemPromptEl = document.getElementById('system-prompt');

function loadSavedConfig() {
  const saved = localStorage.getItem('ollamaWebConfig');
  if (saved) {
    try {
      const config = JSON.parse(saved);
      if (config.temperature) tempSlider.value = config.temperature;
      if (config.context) ctxSlider.value = config.context;
      if (config.systemPrompt) systemPromptEl.value = config.systemPrompt;
      tempVal.textContent = tempSlider.value;
      ctxVal.textContent = ctxSlider.value;
    } catch {}
  }
}

saveBtn.onclick = () => {
  const config = {
    temperature: tempSlider.value,
    context: ctxSlider.value,
    model: modelSelect.value,
    systemPrompt: systemPromptEl.value
  };
  localStorage.setItem('ollamaWebConfig', JSON.stringify(config));
  saveBtn.textContent = 'Salvo!';
  setTimeout(() => saveBtn.textContent = 'Salvar Configurações', 1800);
};

async function loadModels() {
  try {
    const r = await fetch(`${API}/api/tags`);
    const data = await r.json();
    modelSelect.innerHTML = data.models
      .map(m => `<option value="${m.name}">${m.name}</option>`)
      .join('');

    const saved = localStorage.getItem('ollamaWebConfig');
    if (saved) {
      try {
        const config = JSON.parse(saved);
        if (config.model && [...modelSelect.options].some(opt => opt.value === config.model)) {
          modelSelect.value = config.model;
        }
      } catch {}
    }

    sendBtn.disabled = false;
  } catch (err) {
    modelSelect.innerHTML = '<option>Erro – Ollama não responde</option>';
  }
}

// ── Ícones por linguagem ──
function getLangIcon(lang) {
  const icons = {
    html: '🌐', css: '🎨', javascript: '⚡', js: '⚡',
    python: '🐍', py: '🐍', java: '☕', c: '⚙️',
    cpp: '⚙️', 'c++': '⚙️', csharp: '🔷', 'c#': '🔷',
    json: '📋', sql: '🗃️', bash: '💻', sh: '💻',
    typescript: '🔷', ts: '🔷', php: '🐘', ruby: '💎',
    go: '🔵', rust: '🦀', swift: '🍎', kotlin: '🟣',
    xml: '📄', yaml: '📄', yml: '📄', markdown: '📝', md: '📝',
    svg: '🎨'
  };
  return icons[lang.toLowerCase()] || '📄';
}

// ── Renderiza mensagem ──
function renderMessage(text, isUser = false) {
  const div = document.createElement('div');
  div.className = `message ${isUser ? 'user' : 'bot'}`;

  if (isUser) {
    div.textContent = text;
    return div;
  }

  const parts = text.split(/(```[\s\S]*?```)/g);

  for (let part of parts) {
    if (part.startsWith('```') && part.endsWith('```')) {
      const lines = part.slice(3, -3).trim().split('\n');
      let lang = '';
      let codeLines = lines;

      if (lines[0] && !lines[0].match(/^\s*$/) && !lines[0].includes(' ')) {
        lang = lines[0].trim();
        codeLines = lines.slice(1);
      }

      const codeText = codeLines.join('\n');

      // Card clicável no chat
      const ref = document.createElement('div');
      ref.className = 'code-ref';
      ref.innerHTML = `
        <span class="code-ref-icon">${getLangIcon(lang)}</span>
        <span class="code-ref-info">
          <span class="code-ref-title">Abrir código</span>
          <span class="code-ref-lang">${lang || 'code'} · ${codeLines.length} linhas</span>
        </span>
      `;

      ref.onclick = () => openArtifact(lang, codeText);
      div.appendChild(ref);

    } else if (part.trim()) {
      const p = document.createElement('p');
      p.innerHTML = part
        .replace(/\n\n+/g, '</p><p>')
        .replace(/\n/g, '<br>');
      div.appendChild(p);
    }
  }

  return div;
}

// ── Anexos (drag & drop + botão) ──
const attachBar = document.getElementById('attachments-bar');
const attachBtn = document.getElementById('attach-btn');
const fileInput = document.getElementById('file-input');
const dropOverlay = document.getElementById('drop-overlay');
let pendingFiles = []; // { name, type, dataUrl, base64, textContent, isImage }

attachBtn.onclick = () => fileInput.click();

fileInput.onchange = () => {
  addFiles(fileInput.files);
  fileInput.value = '';
};

// Drag & drop
let dragCounter = 0;
const chatArea = document.getElementById('chat-area');

chatArea.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  dropOverlay.classList.add('visible');
});

chatArea.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    dropOverlay.classList.remove('visible');
  }
});

chatArea.addEventListener('dragover', (e) => e.preventDefault());

chatArea.addEventListener('drop', (e) => {
  e.preventDefault();
  dragCounter = 0;
  dropOverlay.classList.remove('visible');
  if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files);
});

function addFiles(fileList) {
  for (const file of fileList) {
    const isImage = file.type.startsWith('image/');

    if (isImage) {
      const reader = new FileReader();
      reader.onload = () => {
        pendingFiles.push({
          name: file.name,
          type: file.type,
          dataUrl: reader.result,
          base64: reader.result.split(',')[1],
          isImage: true
        });
        renderAttachments();
      };
      reader.readAsDataURL(file);
    } else {
      const reader = new FileReader();
      reader.onload = () => {
        pendingFiles.push({
          name: file.name,
          type: file.type,
          textContent: reader.result,
          isImage: false
        });
        renderAttachments();
      };
      reader.readAsText(file);
    }
  }
}

function renderAttachments() {
  attachBar.innerHTML = '';
  if (pendingFiles.length === 0) {
    attachBar.classList.remove('has-items');
    return;
  }
  attachBar.classList.add('has-items');

  pendingFiles.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'attach-item';

    if (f.isImage && f.dataUrl) {
      const img = document.createElement('img');
      img.src = f.dataUrl;
      item.appendChild(img);
    } else {
      const icon = document.createElement('span');
      icon.className = 'attach-item-icon';
      icon.textContent = '📄';
      item.appendChild(icon);
    }

    const name = document.createElement('span');
    name.className = 'attach-item-name';
    name.textContent = f.name;
    item.appendChild(name);

    const remove = document.createElement('button');
    remove.className = 'attach-item-remove';
    remove.textContent = '✕';
    remove.onclick = () => {
      pendingFiles.splice(i, 1);
      renderAttachments();
    };
    item.appendChild(remove);

    attachBar.appendChild(item);
  });
}

// Renderizar mensagem do user com anexos visuais
function renderUserMessage(text, files) {
  const div = document.createElement('div');
  div.className = 'message user';

  if (files && files.length) {
    for (const f of files) {
      if (f.isImage && f.dataUrl) {
        const img = document.createElement('img');
        img.className = 'msg-image';
        img.src = f.dataUrl;
        div.appendChild(img);
      } else {
        const badge = document.createElement('div');
        badge.className = 'msg-file-badge';
        badge.textContent = '📄 ' + f.name;
        div.appendChild(badge);
      }
    }
  }

  if (text) {
    const p = document.createElement('p');
    p.style.margin = '4px 0 0';
    p.textContent = text;
    div.appendChild(p);
  }

  return div;
}

// ── Enviar mensagem ──
let currentAbort = null;
let isStreaming = false;

function setStopMode(active) {
  isStreaming = active;
  if (active) {
    sendBtn.disabled = false;
    sendBtn.textContent = 'Parar';
    sendBtn.classList.add('stop-mode');
  } else {
    sendBtn.textContent = 'Enviar';
    sendBtn.classList.remove('stop-mode');
    sendBtn.disabled = false;
  }
}

async function send() {
  // Se está em streaming, abortar
  if (isStreaming && currentAbort) {
    currentAbort.abort();
    return;
  }

  const text = inputEl.value.trim();
  const files = [...pendingFiles];

  if (!text && files.length === 0) return;

  // Renderizar no chat
  messagesEl.appendChild(renderUserMessage(text, files));

  // Montar conteúdo para a API
  let userContent = '';
  const images = [];

  for (const f of files) {
    if (f.isImage && f.base64) {
      images.push(f.base64);
    } else if (f.textContent) {
      userContent += `[Arquivo: ${f.name}]\n\`\`\`\n${f.textContent}\n\`\`\`\n\n`;
    }
  }

  if (text) userContent += text;
  if (!userContent && images.length) userContent = 'Descreva esta imagem.';

  const apiMessage = { role: 'user', content: userContent };
  if (images.length > 0) apiMessage.images = images;

  conversation.push(apiMessage);

  // Limpar input
  inputEl.value = '';
  pendingFiles = [];
  renderAttachments();

  const botDiv = document.createElement('div');
  botDiv.className = 'message bot';
  botDiv.textContent = 'pensando...';
  messagesEl.appendChild(botDiv);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  let response = '';
  currentAbort = new AbortController();
  setStopMode(true);

  try {
    const sysPrompt = systemPromptEl.value.trim();
    const apiMessages = sysPrompt
      ? [{ role: 'system', content: sysPrompt }, ...conversation]
      : [...conversation];

    const isDirectOllama = API.includes(':11434');

    const res = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: currentAbort.signal,
      body: JSON.stringify({
        model: modelSelect.value,
        messages: apiMessages,
        stream: isDirectOllama,
        options: {
          temperature: parseFloat(tempSlider.value),
          num_ctx: parseInt(ctxSlider.value)
        }
      })
    });

    if (!res.ok) throw new Error('Erro na API');

    if (isDirectOllama) {
      // Modo streaming (direto pro Ollama)
      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value);
        const lines = chunk.split('\n');

        for (const line of lines) {
          if (!line.trim()) continue;
          try {
            const data = JSON.parse(line);
            if (data.message?.content) {
              response += data.message.content;
              botDiv.textContent = response;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
            if (data.prompt_eval_count !== undefined || data.eval_count !== undefined) {
              const promptTk = data.prompt_eval_count || 0;
              const genTk = data.eval_count || 0;
              updateCtxUsage(promptTk, genTk);
            }
          } catch {}
        }
      }
    } else {
      // Modo sem streaming (via servidor JP)
      const data = await res.json();
      if (data.message?.content) {
        response = data.message.content;
      } else if (data.response) {
        response = data.response;
      }
      botDiv.textContent = response;
      messagesEl.scrollTop = messagesEl.scrollHeight;

      if (data.prompt_eval_count !== undefined || data.eval_count !== undefined) {
        updateCtxUsage(data.prompt_eval_count || 0, data.eval_count || 0);
      }
    }
  } catch (err) {
    if (err.name === 'AbortError') {
      // Interrompido pelo usuário — manter o que já foi gerado
    } else {
      botDiv.textContent = 'Erro: ' + err.message;
      setStopMode(false);
      currentAbort = null;
      return;
    }
  }

  // Finalizar (completo ou interrompido)
  if (response) {
    const rendered = renderMessage(response);
    botDiv.innerHTML = '';
    while (rendered.firstChild) {
      botDiv.appendChild(rendered.firstChild);
    }

    const refs = botDiv.querySelectorAll('.code-ref');
    if (refs.length > 0) {
      refs[refs.length - 1].click();
    }

    conversation.push({ role: 'assistant', content: response });
    saveCurrentChat();
  }

  setStopMode(false);
  currentAbort = null;
}

// ── Eventos ──
sendBtn.onclick = send;
inputEl.onkeydown = e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};

loadSavedConfig();
loadModels();
currentChatId = generateId();
renderHistory();
